<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>

    <!--tailwind cdn-->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--daisy ui cdn-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- awsome-font cdn  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--css-->
    <link rel="stylesheet" href="./styles/styles.css">




</head>
<body class="primary-font ">

    <section class="flex items-center justify-center min-h-screen mb-10">

        <div class=" rounded-lg w-[450px]  bg-[#F4F5F7] mt-10">


            <!-- nav section -->
            <div class=" nav-container flex justify-between items-center mx-4 p-4 border-b-1  border-gray-300">

                <div class="flex items-center  ">
                    <div>
                    <img src="./assets/Group.png" class="h-[50px] cursor-pointer" alt="logo">
                    </div>

                    <div>
                    <h1 class="text-lg font-extrabold text-[#1C1C1C]">$45000</h1>
                    <p class="text-sm font-normal text-gray-600">Available Balance</p>
                    </div>
                </div>    

                <button class="btn text-sm font-medium text-gray-500"><i class="fas fa-sign-out-alt text-gray-700 rotate-180"></i> Log Out</button>
                
            </div>

            <!-- main section -->
            <div class="mt-[32px] mx-4 ">
                <h1 class="text-2xl font-bold text-[#1C1C1C]">🔥Welcome to Payooo!</h1>
                <p class="mt-[12px] text-base text-gray-700">Enjoy easy and convenient financial services with us. Cashout charge is low.</p>
            </div>

            <!-- feature cards -->
            <div class="mt-6 mx-4 grid grid-cols-3 gap-4 justify-center items-center">

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/wallet1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2">Add Money</h2>
                    </div>
                </div>

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/send1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2">Cashout</h2>
                    </div>
                </div>

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/money1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2 ">Transfer</h2>
                    </div>
                </div>

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/bonus1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2">Get Bonus</h2>
                    </div>
                </div>

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/purse1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2">Pay Bill</h2>
                    </div>
                </div>

                <div class="border-2 border-gray-300 rounded-xl cursor-pointer">
                    <div class="px-5 py-6">
                        <img src="./assets/transaction1.png" class="mx-auto" alt="">
                        <h2 class="text-center mt-2">Transactions</h2>
                    </div>
                </div>

                

            </div>

            <!-- gapppppppppppp -->
            <div class="mt-6 mx-4 pb-6">
                <!--add money section-->
                <h2 class="text-lg font-semibold">Add Money</h2>

                <div class="mt-4 bg-white min-h-[300px] rounded-2xl">

                    <form>
                        <div class="px-5 py-4">
                        <label><span class="font-medium">Select A Bank</span></label>
                        <select class="select select-bordered rounded-full w-full mt-1 outline-none px-6 py-6">
                            <option  disabled selected>Choose your bank</option>
                            <option>Bank A</option>
                            <option>Bank B</option>
                            <option>Bank C</option>

                        </select>
                        </div>

                        <div class="px-5 py-2">
                            <label><span class="font-medium">Bank Account Number</span></label>
                            <input type="text" placeholder="Enter your bank account number" class="input input-bordered rounded-full w-full mt-1 outline-none px-6 py-6">
                        </div>
                    
                        <div class="px-5 py-2">
                            <label><span class="font-medium">Amount to Add</span></label>
                            <input type="text" placeholder="Enter amount to add" class="input input-bordered rounded-full w-full mt-1 outline-none px-6 py-6">
                        </div>

                        <div class="px-5 py-2 ">
                            <label><span class="font-medium">Pin Number</span></label>
                            <input type="password" placeholder="Enter your pin number" class="input input-bordered rounded-full w-full mt-1 outline-none px-6 py-6">
                        </div>

                        <div class="px-5 py-2 pb-6">
                            <button type="button" id="" class=" font-bold bg-blue-500 text-white py-3 w-full  rounded-4xl mt-3 cursor-pointer">Add Money</button>
                        </div>

                    </form>

                </div>
            </div>
            
            




        </div>



    </section>



    
</body>
</html>
